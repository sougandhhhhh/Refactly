name: CI
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & type-check client
        run: |
          cd client
          npm install
          npx tsc --noEmit
      - name: Install & build server
        run: |
          cd server
          npm install
          npx tsc
      - name: Lint client
        run: |
          cd client
          npm run lint
